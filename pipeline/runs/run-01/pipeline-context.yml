# Aliases — concrete values substituted into the glossary template at dispatch
# time so sub-agents never guess paths or detect runners. Populated by:
#   initRun()     — runDir, pass, skillRoot, repoRoot, rules, tsRunner
#   05-pass-gate  — previousRunLog
#   10-prime      — buildCmd, testCmd
# Derived aliases ($pipelineRoot, $phasesDir, $refs, …) are computed from these
# anchors inside $refs/templates/glossary.tpl.md — they are NOT duplicated here.
aliases:
  runDir: /tmp/workspace/perf-job-20260508-160834/pipeline/runs/run-01
  pass: core
  skillRoot: /tmp/workspace/perf-job-20260508-160834/.claude/skills/pipeline-build-game
  repoRoot: /tmp/workspace/perf-job-20260508-160834
  rules: /tmp/workspace/perf-job-20260508-160834/.claude/rules
  tsRunner: bun
  previousRunLog: null
  buildCmd: "bun run build"
  testCmd: "bun run test"

# Pass context — mirrored by phase 10 (prime) from $runLog.pass and
# $phaseSummary.pass_gate.previous_pass_stable. Downstream phases read these
# via the normal read($runContext) path.
pass: core
previous_pass_stable: null

# Stack — detected by 10-prime from the host project.
stack:
  renderer: pixi
  ui: solidjs
  bundler: vite
  runtime: bun
  testing: vitest
  animation: gsap
  build_cmd: "bun run build"
  test_cmd: "bun run test"
  summary: "pixi + solidjs + gsap + bun (vite, vitest)"

# Paths — detected by 10-prime from the host project layout.
paths:
  tests: "tests/"
  modules: "src/modules/"
  core: "src/core/"
  game: "src/game/"
  docs: "docs/"

existing-features:
  - DOM-mode stub game controller (placeholder — no game logic)
  - DOM-mode stub start screen (loads GPU, transitions to game screen)
  - SolidJS screen shell wiring (loading, start, game, results)
  - Global game state signals (score, level) in src/game/state.ts
  - Asset manifest with theme-branding bundle only (no scene/core bundles yet)
  - Wolf Games Logo DOM overlay in GameScreen (absolute bottom-8)
  - PauseOverlay system in GameScreen

dom-overlays:
  - element: Logo
    file: src/game/screens/GameScreen.tsx
    position: bottom
    height-px: 32
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"
  - element: PauseOverlay
    file: src/game/screens/GameScreen.tsx
    position: overlay
    height-px: 0
    css: "overlay (system-managed)"

