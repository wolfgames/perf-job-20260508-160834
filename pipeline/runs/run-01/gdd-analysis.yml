      Win trigger: runner grounded on exit for >= 0.3s → win state.
      Accent color is seeded (derived from level seed, not Math.random()).

  - id: procedural-level-gen
    name: "Procedural Level Generation — seeded PRNG, difficulty params, layout, solvability"
    status: new
    risk: HIGH
    complexity: high
    cos_required: [core-interaction]
    ux_zones:
      thumb_zone: out-of-reach
      touch_targets: []
      feedback_surfaces: []
    affected_files:
      - <game-root>/generation/LevelGenerator.ts
      - <game-root>/generation/SolvabilityChecker.ts
      - <game-root>/generation/rng.ts
      - tests/generation/level-generator.test.ts
    dependencies: [platform-static, platform-moving, platform-crumbling, platform-exit, physics-system]
    ux:
      discovery: "N/A — invisible infrastructure"
      feedback: "Same seed always produces identical level — reproducibility is a feature"
      onboarding: "N/A — transparent to player"
    notes: >
      Seed formula: levelNumber × 99991.
      Difficulty parameters scale with levelNumber (platformCount, movingRatio,
      crumblingRatio, platformWidthRange, gapRange, cameraSpeed).
      No moving platforms before level 4; no crumbling before level 7.
      Solvability check: simulate runner path, reject on GAP_TOO_WIDE,
      RISE_TOO_HIGH, CONSECUTIVE_CRUMBLING, NO_EXIT.
      Retry logic: up to 10 retries (seed+1 each time), then safe-mode fallback
      (static platforms only, fixed width/gap/rise, always solvable).
      Generation must complete in < 16 ms (perf benchmark constraint).
      Math.random() is forbidden — all randomness through seeded PRNG.
      Risk: HIGH — cross-cutting, touches platform layout, physics validation,
      seed state management.

