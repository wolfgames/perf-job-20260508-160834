    notes: >
      Dashed-outline overlay on rectangle. On first contact: 0.4s timer starts.
      After 0.4s: 0.3s shake animation (GSAP), then platform disappears.
      No collision after crumble. Runner jumping before crumble completes does not
      reset crumble timer. No two consecutive platforms may both be crumbling.

  - id: platform-exit
