    notes: >
      Solid mid-grey rectangle, 2–6 units wide, 0.5 units tall.
      One-way collision: runner lands on top, passes through from below.
      Underside hit zeros vertical velocity.
      First platform always width 4, centered, y=2 from bottom — never randomized.

