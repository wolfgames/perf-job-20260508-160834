    notes: >
      Same visual as static platform, tinted slightly lighter grey.
      Oscillates horizontally between two lane boundaries at 1–2 units/s.
      Platform delta added to runner.x each frame while runner is grounded on it.
      If platform pushes runner to viewport edge, horizontal wrap applies normally.

