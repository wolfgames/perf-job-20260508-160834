    dependencies: []
    ux:
      discovery: "N/A — internal state; player perceives state changes through animations"
      feedback: "State transitions drive all game responses (jump allowed, input blocked, etc.)"
      onboarding: "N/A"
    notes: >
      States: Idle, Airborne, CoyoteWindow, Animating, Won, Lost, Paused.
      Idle → Airborne on tap (jump impulse).
      Airborne → Grounded on platform landing.
      CoyoteWindow: 120ms after leaving edge; tap still allowed.
      Animating: crumble/squash/stretch playing — input queued, not blocked.
      Won/Lost: no input allowed. Paused: system-level, no input.
      All state transitions that produce visible changes must be animated (GSAP).

