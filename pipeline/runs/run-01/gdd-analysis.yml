    ux:
      discovery: "Runner is visually prominent (dark charcoal 1×2 rect) against white void"
      feedback: "Jump stretch animation on tap; squash/settle on landing"
      onboarding: "Runner auto-drifts horizontally — player immediately sees motion and taps"
    notes: >
      Dark charcoal 1×2 unit rectangle. Automatic horizontal drift (slight
      left-right oscillation, seeded per level). Wraps at viewport edges.
      Jump stretch and landing squash driven by GSAP. State machine transitions:
      Grounded → Airborne → (CoyoteWindow) → Grounded / Lost.

  - id: physics-system
    name: "Physics System — gravity, jump impulse, terminal velocity, coyote time, platform carry"
    status: new
    risk: HIGH
    complexity: high
    cos_required: [core-interaction, animated-dynamics]
    ux_zones:
      thumb_zone: center
      touch_targets: []
      feedback_surfaces: [canvas, runner-sprite]
    affected_files:
      - <game-root>/systems/PhysicsSystem.ts
      - <game-root>/state/PhysicsPlugin.ts
    dependencies: [runner-entity, board-state-machine]
    ux:
      discovery: "Physics manifest immediately on first tap — runner jumps and falls"
      feedback: "Every tap produces instant jump response; gravity makes falling feel physical"
      onboarding: "Physics teaches itself: gravity is the teacher, platforms are the lesson"
    notes: >
      Core rules from GDD (all in game units / ms):
        - Jump impulse: +14 units/s upward, instantaneous.
        - Gravity: -28 units/s² per frame when airborne.
        - Terminal velocity: -20 units/s downward (clamp).
        - Landing: vertical velocity → 0, state → Grounded within 1 frame (16 ms).
        - Coyote time: 120 ms window after leaving edge allows jump.
        - Moving platform carry: runner.x offset by platform.delta each frame.
        - Horizontal wrap: runner.x > viewportRight → runner.x = 0; vice versa.
        - Underside hit: vertical velocity → 0, runner begins falling.
        - Failure: runner.y < viewportBottom → trigger Lost state.
      Must use seeded RNG for horizontal drift; no Math.random().
      Risk: HIGH — central physics loop, cross-cutting impact on all game entities.

