conflicts: []

risk_areas:
  - feature: game-controller-gpu
    reason: >
      Central integration point. Replaces DOM stub with full Pixi Application + ECS + all
      renderers. Touches GameController contract, viewport layout, ECS lifecycle,
      and every downstream feature. Must be built before any renderer can be tested.

  - feature: physics-system
    reason: >
      Cross-cutting loop: gravity + jump + coyote time + platform carry + wrap affect
      every other game entity. If physics constants drift from GDD spec, solvability
      checker may reject levels that were designed to be reachable.

  - feature: procedural-level-gen
    reason: >
      Generation must complete in < 16 ms (explicit GDD perf constraint). Solvability
      simulation uses the same physics constants as the runtime — divergence between
      generation-time simulation and runtime physics will produce unsolvable levels
      that pass the solvability check. Seed reproducibility requires deterministic
      PRNG across engine versions.

  - feature: camera-system
    reason: >
      Viewport layout authority. Feeds HUD strip positioning, platform scroll speed,
      and height-meter value. Incorrect dead zone breaks playability (runner scrolls
      off-screen before player can react).

open_questions:
  - id: q-scoring-cos
    question: >
      GDD specifies pass/fail only — no score, no leaderboard striation. The scoring
      CoS (gated at core pass) requires at least 2 multiplicative dimensions and a
      chain multiplier. Velocity Rush has no combo or chain mechanics. How should
      the scoring CoS be satisfied or waived for this game?
    context: >
      GDD 'At a Glance' table: 'Star Rating: None — pass/fail only'.
      GDD 'Level Complete Screen' shows height, time, avg frame time — not a score.
      The scoring CoS exit criteria require 'at least 2 multiplicative dimensions'
      and 'chain/cascade depth multiplies the score' — neither concept maps to a
      single-input platformer. Options: (a) derive a time-based performance score
      from height × (1/time) × frame-efficiency for leaderboard potential;
      (b) treat scoring CoS as not-applicable for this perf-benchmark archetype.
      Plan must resolve before implement.

  - id: q-audio-scope
    question: >
      GDD does not mention audio (no SFX, no music, no audio bundle). Should an
      audio-sfx bundle and audio unlock be included or explicitly omitted?
    context: >
      Scaffold start screen already calls loadAudio() with a silent catch.
      mobile-constraints.mdc rule requires unlockAudio() on first user tap.
      GDD is silent on audio — this is a gap, not a stated omission.
      If audio is omitted entirely, guardrail #15 (no stubs/placeholders) means
      the audio load in startView.ts should be removed rather than left as a
      no-op stub. Plan must decide.

warnings:
  - >
    collision:hud-reserved-top — gdd=80pt HUD strip at top of viewport vs
    skill=reserved_top_px=0 (pipeline-context.yml prime.carry_forward) — soft.
    GDD pins an exact 80pt value for the HUD height; prime detected reserved_top_px=0
    (no pre-reserved space). Plan must set reserved_top_px=80 (or logical-unit
    equivalent) to allocate the HUD band and pass the value to renderers.
    allow-gdd-overrides=false means skill wins by default, but 80pt is a GDD-specified
    layout dimension — if plan drops it, the HUD has no reserved space.
    Classified soft: touch-target floor is not at stake; this is a viewport-gap value.

  - >
    collision:results-screen-heading — gdd="Try Again?" (no 'Game Over' language) vs
    scaffold=ResultsScreen.tsx heading 'Game Over' (src/game/screens/ResultsScreen.tsx:9)
    — soft. GDD explicitly states no 'Game Over' language on the failure branch.
    Current scaffold uses 'Game Over'. Plan must rename to 'Try Again?' on failure
    branch. Classified soft: wording/tone is reskinnable.

  - >
    collision:scoring-cos — gdd=pass/fail only (no score, no leaderboard) vs
    cos=scoring CoS gated at core pass requires multiplicative score dimensions
    (references/conditions/scoring.md) — soft. GDD archetype (perf benchmark
    platformer) does not fit the scoring CoS model. Open question q-scoring-cos
    captures the resolution options. Plan must decide before implement.
